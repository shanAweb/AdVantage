<!DOCTYPE html>
<html>
<head>
    <title>Test Routing</title>
</head>
<body>
    <h1>Test Frontend Routing</h1>
    <p>If you can see this, the frontend is running.</p>
    
    <h2>Test Links:</h2>
    <ul>
        <li><a href="http://localhost:3000">Home</a></li>
        <li><a href="http://localhost:3000/signin">Sign In</a></li>
        <li><a href="http://localhost:3000/signup">Sign Up</a></li>
        <li><a href="http://localhost:3000/dashboard">Dashboard</a></li>
        <li><a href="http://localhost:3000/dashboard/campaigns">Campaigns</a></li>
        <li><a href="http://localhost:3000/dashboard/feeds">Feeds</a></li>
        <li><a href="http://localhost:3000/dashboard/seo">SEO Tools</a></li>
        <li><a href="http://localhost:3000/dashboard/settings">Settings</a></li>
    </ul>
    
    <h2>Test API:</h2>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="api-result"></div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                document.getElementById('api-result').innerHTML = 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('api-result').innerHTML = 
                    '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
